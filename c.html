<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소 현황</title>

<style>
body{
margin:0;
padding:12px;
font-family:Arial, sans-serif;
background:#ffffff;
}

.wrap{
max-width:430px;
margin:0 auto;
}

.title{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border:1px solid #cfcfcf;
text-align:center;
padding:12px 10px;
font-size:18px;
white-space:nowrap;
}

.date{
width:130px;
font-size:16px;
}

.count{
width:60px;
font-size:42px;
font-weight:700;
}

.label{
width:70px;
font-size:16px;
font-weight:600;
}

.emoji{
width:60px;
font-size:34px;
}

.note{
margin-top:10px;
font-size:13px;
color:#666;
text-align:center;
}

@media (max-width:480px){
body{
padding:8px;
}

.wrap{
max-width:360px;
}

.title{
font-size:20px;
margin-bottom:10px;
}

td{
padding:10px 6px;
}

.date{
width:118px;
font-size:14px;
}

.count{
width:52px;
font-size:34px;
}

.label{
width:58px;
font-size:15px;
}

.emoji{
width:52px;
font-size:30px;
}

.note{
font-size:12px;
}
}
</style>
</head>

<body>

<div class="wrap">

<div class="title">OMG 청소 스케줄</div>

<table id="sheetTable"></table>

<div class="note">
예상 청소 건수이므로 변경될 수 있음. 최종확인 필수
</div>

</div>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5USKZK-uEC6ayiKOzSLU9cCu-Mka_irBI-ihD5wJ3f7TNl9j_wDF4N1Wv63qbJNBGDoXQhC1Lf6ZG/pub?output=csv&gid=1588398259";

fetch(sheetUrl)
.then(response => response.text())
.then(csv => {
  const rows = csv.trim().split("\n").map(row =>
    row.split(",").map(cell => cell.replace(/^"|"$/g,"").trim())
  );

  const table = document.getElementById("sheetTable");

  rows.forEach(row => {
    const tr = document.createElement("tr");

    row.forEach((cell, colIndex) => {
      const td = document.createElement("td");
      td.textContent = cell;

      if(colIndex === 0) td.className = "date";
      if(colIndex === 1) td.className = "count";
      if(colIndex === 2) td.className = "label";
      if(colIndex === 3) td.className = "emoji";

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
});
</script>

</body>
</html>
